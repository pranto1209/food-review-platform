<div class="container">
  <div class="mt-5">
    <div class="col-12 col-md-6 col-lg-4 mx-auto">
      <h1>Login</h1>

      <form #form="ngForm" (ngSubmit)="onFormSubmit()">
        <div class="mt-3">
          <label for="email" class="form-label">Email</label>
          <input type="text" class="form-control" id="email" name="email" [(ngModel)]="model.email">
        </div>

        <div class="mt-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" name="password" [(ngModel)]="model.password">
        </div>

        <div class="mt-3">
          <button type="submit" class="btn btn-primary w-100 mb-2">Login</button>
          <button class="btn btn-primary w-100 mb-2" (click)="signInWithFacebook()">
            <i class="bi bi-facebook"></i> Login with Facebook
          </button>
          <button class="btn btn-danger w-100 mb-2" (click)="signInWithGoogle()">
            <i class="bi bi-google"></i> Login with Google
          </button>
        </div>

      </form>

    </div>
  </div>
</div>
