<div class="container">
  <div class="mt-5">
    <div class="col-12 col-md-6 col-lg-4 mx-auto">
      <h1>Register</h1>

      <form #form="ngForm" (ngSubmit)="onFormSubmit()">

        <div class="mt-3">
          <label for="userName" class="form-label">User Name</label>
          <input type="text" class="form-control" id="userName" name="userName" [(ngModel)]="model.userName">
        </div>

        <div class="mt-3">
          <label for="email" class="form-label">Email</label>
          <input type="text" class="form-control" id="email" name="email" [(ngModel)]="model.email">
        </div>

        <div class="mt-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" name="password" [(ngModel)]="model.password">
        </div>

        <div class="mt-3">
          <button type="submit" class="btn btn-primary w-100 mb-2">Register</button>
          <button class="btn btn-primary w-100 mb-2" (click)="registerWithFacebook()">
            <i class="bi bi-facebook"></i> Register with Facebook
          </button>
          <button class="btn btn-danger w-100 mb-2" (click)="registerWithGoogle()">
            <i class="bi bi-google"></i> Register with Google
          </button>
        </div>
      </form>

    </div>
  </div>
</div>
