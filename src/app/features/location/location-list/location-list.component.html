<div class="container">

    <h5 class="mt-3">Location List</h5>

    <div class="d-flex justify-content-between mt-3">
        <div class="d-flex">
            <input type="text" class="form-control" #queryText>
            <button type="button" class="btn btn-warning ms-3" (click)="onSearch(queryText.value)">Search</button>
        </div>
    </div>

    <ng-container>
        <table class="table table-bordered mt-3">
            <thead>
                <tr>
                    <th>SN</th>
                    <th>Area</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let location of locations; let i = index">
                    <td>{{ (pageNumber - 1) * pageSize + i + 1 }}</td>
                    <td>{{location.area}}</td>
                    <td>
                        <a class="btn btn-primary" [routerLink]="['/restaurant']"
                            [queryParams]="{ id: location.id }">View Restaurant</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <nav aria-label="Page navigation example">
      <ul class="pagination">
        <li class="page-item"><a class="page-link" (click)="getPrevPage()">Previous</a></li>

        <li *ngFor="let item of list;let index = index" class="page-item" >
          <a class="page-link" (click)="getPage(index + 1)">{{index + 1}}</a>
        </li>

        <li class="page-item"><a class="page-link" (click)="getNextPage()">Next</a></li>
      </ul>
    </nav>


    </ng-container>

</div>
