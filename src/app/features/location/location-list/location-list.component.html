<div class="container">

    <h5 class="mt-3">Location List</h5>

    <ng-container *ngIf="locations$ | async as locations">
        <table class="table table-bordered mt-3">
            <thead>
                <tr>
                    <th>SN</th>
                    <th>Area</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let location of locations.data; let i = index">
                    <td>{{i + 1}}</td>
                    <td>{{location.area}}</td>
                    <td>
                        <a class="btn btn-primary" [routerLink]="['/restaurant']" [queryParams]="{ id: location.id }">View Restaurant</a>
                    </td>
                </tr>
            </tbody>
        </table>


    </ng-container>

</div>
