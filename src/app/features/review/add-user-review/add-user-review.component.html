<div class="container">

  <h1 class="mt-3">Add User Review</h1>

  <form #form="ngForm" (ngSubmit)="onFormSubmit()">
    <div class="mt-2">

      <div class="mt-3">
        <label class="form-label">Rating</label>
        <input type="number" id="rating" class="form-control"
        name="rating" [(ngModel)]="model.rating">
      </div>
      
      <div class="mt-3">
        <label class="form-label">Comment</label>
        <input type="text" id="comment" class="form-control"
        name="comment" [(ngModel)]="model.comment">
      </div>

      <div class="mt-3">
        <label class="form-label">Restaurant</label>
        <input type="number" id="restaurantId" class="form-control"
        name="restaurantId" [(ngModel)]="model.restaurantId">
      </div>

      <div class="mt-3">
        <button type="submit" class="btn btn-primary">Save</button>
      </div>

    </div>


  </form>

</div>
