<div class="container">

    <h1 class="mt-3">Review List</h1>

    <div class="d-flex justify-content-between mt-3">
        <div class="d-flex">
            <!-- <input type="text" class="form-control" #queryText> -->
            <!-- <button type="button" class="btn btn-warning ms-3" (click)="onSearch(queryText.value)">Search</button> -->
        </div>

        <a [routerLink]="['/user-review/add']" class="btn btn-primary">Add Review</a>
    </div>
    <ng-container>
        <table class="table table-bordered mt-3">
            <thead>
                <tr>
                    <th>SN</th>
                    <th>User Name</th>
                    <th>Restaurant Name</th>
                    <th>Area</th>
                    <th>Rating</th>
                    <th>Comment</th>
                    <th>Review Time</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngIf="!reviews || reviews.length === 0">
                    <td colspan="7" class="text-center">No record to display</td>
                </tr>
                <tr *ngFor="let review of reviews; let i = index">
                    <td>{{i + 1}}</td>
                    <td>{{review.userName}}</td>
                    <td>{{review.restaurantName}}</td>
                    <td>{{review.area}}</td>
                    <td>{{review.rating}}</td>
                    <td>{{review.comment}}</td>
                    <td>{{review.reviewTime | date: 'dd/MM/yyyy, hh:mm:ss a'}}</td>
                    <td>
                        <a class="btn btn-primary" [routerLink]="['/user-review/edit']" [queryParams]="{ id: review.id }">Edit</a>
                    </td>
                </tr>
            </tbody>
        </table>

    </ng-container>

</div>
